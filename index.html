<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>こども映画カレンダー｜二子玉川109シネマズ</title>
<style>
  /* 落ち着いた・シンプルなライトテーマ（ダークモード非追従） */
  :root{
    color-scheme:light;
    --bg:#f4f2ec; --card:#ffffff; --ink:#403a32; --sub:#948b7d;
    --line:#e6e0d5; --accent:#c67f54; --accent-d:#b06f47;
    --kid:#c17b8f; --fam:#6e97bd; --gen:#b3a89a; --now:#7d9e6f;
    --chip:#f1ece2; --shadow:0 2px 10px rgba(90,70,45,.06);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;color:var(--ink);background:var(--bg);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;
    line-height:1.6;padding-bottom:44px;min-height:100vh}
  header{position:sticky;top:0;z-index:20;color:#fff;padding:15px 18px 17px;
    background:var(--accent);border-radius:0 0 16px 16px;box-shadow:0 2px 10px rgba(90,70,45,.14)}
  h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
  .sub{margin:6px 0 0;font-size:12.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:rgba(255,255,255,.92)}
  .sub .pin{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:999px;font-weight:700}
  .wrap{max-width:820px;margin:0 auto;padding:18px 14px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .seg button{border:0;background:none;color:var(--sub);font-weight:700;font-size:13.5px;padding:7px 15px;border-radius:999px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--accent);color:#fff}
  .toggle{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;user-select:none;color:var(--ink)}
  .toggle .dot{width:36px;height:21px;border-radius:999px;background:#ded6c8;position:relative;transition:.2s}
  .toggle .dot::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .toggle.on .dot{background:var(--accent)}
  .toggle.on .dot::after{left:17px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--sub);font-weight:600;margin:-2px 0 8px;padding-left:2px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block}
  /* セクション見出し＝区切り線 */
  .month{font-size:14px;font-weight:700;margin:30px 2px 14px;color:var(--ink);display:flex;align-items:center;gap:12px}
  .month::after{content:"";flex:1;height:1px;background:var(--line)}
  .month:first-child{margin-top:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:12px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s, border-color .15s}
  .card:hover{box-shadow:0 4px 14px rgba(90,70,45,.12);border-color:#dccfbe}
  /* サムネイル（横長バナー） */
  .thumb{position:relative;width:100%;height:172px;background-size:cover;background-position:center;
    background-color:#eee7db;display:block}
  @media(max-width:520px){.thumb{height:146px}}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb.ph{background:linear-gradient(135deg,#e4d8c6,#cdb8a6);display:flex;align-items:center;justify-content:center;font-size:42px}
  .thumb .catbar{position:absolute;left:0;top:0;bottom:0;width:6px}
  .ov-date{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.95);color:var(--accent-d);
    font-weight:700;font-size:13.5px;line-height:1.05;padding:5px 10px;border-radius:11px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.16)}
  .ov-date small{display:block;font-size:9.5px;color:var(--sub);font-weight:600;margin-top:1px}
  .ov-badge{position:absolute;right:10px;top:10px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;color:#fff;box-shadow:0 1px 5px rgba(0,0,0,.18)}
  .ov-badge.soon{background:var(--accent)}
  .ov-badge.now{background:var(--now)}
  .ov-badge.later{background:rgba(255,255,255,.95);color:var(--accent-d)}
  .body{padding:12px 15px 14px}
  .title{font-size:15.5px;font-weight:700;margin:0 0 5px;letter-spacing:.01em}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0 0}
  .chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--chip);color:var(--sub)}
  .chip.kid{background:rgba(193,123,143,.14);color:var(--kid)}
  .chip.fam{background:rgba(110,151,189,.14);color:var(--fam)}
  .chip.mubi{background:rgba(198,127,84,.15);color:var(--accent-d)}
  .chip.now{background:rgba(125,158,111,.16);color:var(--now)}
  .detail{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--line);font-size:13.5px}
  .card.open .detail{display:block}
  .detail .meta{font-size:12px;color:var(--sub);margin:0 0 8px}
  .detail .k{font-weight:700;font-size:12.5px;color:var(--accent-d);display:flex;align-items:center;gap:5px;margin:10px 0 5px}
  .mubi-box{background:var(--chip);border-radius:12px;padding:11px 13px}
  .mubi-box .price{font-weight:700;color:var(--accent-d);font-size:14px}
  .mubi-box .perk{font-size:12.5px;margin-top:4px}
  .nomubi{color:var(--sub);font-size:12.5px}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
  .links a{font-size:12.5px;font-weight:700;text-decoration:none;border-radius:999px;padding:8px 15px}
  .links a.fill{background:var(--accent);color:#fff}
  .links a.ghost{color:var(--accent-d);border:1px solid var(--accent)}
  .empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}
  footer{text-align:center;color:var(--sub);font-size:11px;margin-top:28px;padding:0 14px;line-height:1.7}
  footer a{color:var(--accent-d);font-weight:600}
</style>

<header>
  <h1>🎬 こども映画カレンダー</h1>
  <div class="sub"><span class="pin">📍 二子玉川 109シネマズ</span><span>公開日・ムビチケ特典がひと目でわかる</span></div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="seg" id="seg">
      <button data-v="list" class="on">📋 リスト</button>
      <button data-v="cal">🗓 カレンダー</button>
    </div>
    <div class="toggle on" id="kidToggle"><span class="dot"></span><span>子ども向けだけ</span></div>
  </div>
  <div class="legend">
    <span><i class="swatch" style="background:var(--kid)"></i>幼児・子ども向け</span>
    <span><i class="swatch" style="background:var(--fam)"></i>ファミリー</span>
    <span><i class="swatch" style="background:var(--now)"></i>上映中</span>
    <span>🎟 ＝ムビチケ特典あり</span>
  </div>
  <div id="stage"></div>
</div>

<footer>
  上映情報は <a id="thlink" href="#" target="_blank" rel="noopener">109シネマズ二子玉川</a> の上映中・公開予定作品を元に週1回自動更新。<span id="updated"></span><br>
  ムビチケ特典は手動まとめ。価格・特典・公開日は変更される場合があります。おでかけ前に公式サイトでご確認ください。
</footer>

<script>
// data.js を日替わりクエリで読む（週次更新が確実に反映されるようキャッシュ回避）
document.write('<script src="data.js?d=' + new Date().toISOString().slice(0,10) + '"><\/script>');
</script>
<script>
const DATA = window.MOVIE_DATA || {movies:[], theater:"二子玉川 109シネマズ", theaterUrl:"https://109cinemas.net/futakotamagawa/"};
const MOVIES = DATA.movies || [];
const WD = ["日","月","火","水","木","金","土"];
let TODAY = new Date(); TODAY.setHours(0,0,0,0);
let view = "list", kidOnly = true;

function parse(d){ if(!d) return null; const [y,m,day]=d.split("-").map(Number); return new Date(y,m-1,day); }
function catLabel(c){ return c==="kid"?"子ども向け":c==="fam"?"ファミリー":"一般"; }
function catColor(c){ return c==="kid"?"var(--kid)":c==="fam"?"var(--fam)":"var(--gen)"; }
function daysLeft(dt){ return dt? Math.round((dt - TODAY)/86400000) : null; }

function visible(){ return MOVIES.filter(m=> kidOnly ? m.cat!=="gen" : true); }

function statusInfo(m){
  const dt = parse(m.date), dl = daysLeft(dt);
  if(m.status==="now" || (dl!==null && dl<=0)) return {cls:"now", t:"🎬 上映中"};
  if(dl===0) return {cls:"soon", t:"🎉 本日公開"};
  if(dl!==null && dl>0 && dl<=14) return {cls:"soon", t:`あと${dl}日`};
  if(dl!==null && dl>0) return {cls:"later", t:`あと${dl}日`};
  return {cls:"later", t:"公開予定"};
}
function chips(m){
  let h = `<span class="chip ${m.cat==='kid'?'kid':m.cat==='fam'?'fam':''}">${catLabel(m.cat)}</span>`;
  h += `<span class="chip">${m.age||""}</span>`;
  if(m.env) h += `<span class="chip">${m.env.split(",")[0]}</span>`;
  if(m.mubi) h += `<span class="chip mubi">🎟 ムビチケ特典</span>`;
  return h;
}
function mubiHtml(m){
  if(!m.mubi) return `<p class="nomubi">この作品のムビチケ特典情報は未登録です。下のリンクから公式サイトでご確認ください。</p>`;
  return `<div class="mubi-box"><div class="price">💴 ${m.mubi.price}</div><div class="perk">🎁 ${m.mubi.perk}</div></div>`;
}
function card(m){
  const dt = parse(m.date);
  const s = statusInfo(m);
  const dstr = dt ? `${dt.getMonth()+1}/${dt.getDate()}<small>${WD[dt.getDay()]}曜</small>` : `<small>日付未定</small>`;
  const cb = `<span class="catbar" style="background:${catColor(m.cat)}"></span>`;
  const overlays = `${cb}<span class="ov-date">${dstr}</span><span class="ov-badge ${s.cls}">${s.t}</span>`;
  const thumb = m.img
    ? `<div class="thumb"><img loading="lazy" src="${m.img}" alt="">${overlays}</div>`
    : `<div class="thumb ph">${overlays}<span>🎬</span></div>`;
  const meta = [m.director&&("監督: "+m.director), m.actor&&("出演: "+m.actor.slice(0,40)+(m.actor.length>40?"…":""))].filter(Boolean).join(" ／ ");
  return `<div class="card" data-t="${encodeURIComponent(m.t)}">
    ${thumb}
    <div class="body">
      <p class="title">${m.t}</p>
      <div class="chips">${chips(m)}</div>
      <div class="detail">
        ${meta?`<p class="meta">${meta}</p>`:""}
        <div class="k">🎟 ムビチケ（前売り券）特典</div>
        ${mubiHtml(m)}
        <div class="links">
          <a class="fill" href="${m.site}" target="_blank" rel="noopener">二子玉川の上映時間・詳細 ↗</a>
          <a class="ghost" href="https://www.google.com/search?q=${encodeURIComponent(m.t+' ムビチケ 特典')}" target="_blank" rel="noopener">ムビチケ特典を調べる ↗</a>
        </div>
      </div>
    </div>
  </div>`;
}
function bind(){ document.querySelectorAll(".card").forEach(c=>c.addEventListener("click",e=>{ if(!e.target.closest("a")) c.classList.toggle("open"); })); }

function renderList(){
  const list = visible();
  const up = list.filter(m=>{ const dl=daysLeft(parse(m.date)); return m.status!=="now" && dl!==null && dl>0; });
  const now = list.filter(m=> m.status==="now" || (()=>{const dl=daysLeft(parse(m.date));return dl!==null&&dl<=0;})());
  up.sort((a,b)=> b.kidScore-a.kidScore || (a.date||"9").localeCompare(b.date||"9"));
  now.sort((a,b)=> b.kidScore-a.kidScore || (b.date||"").localeCompare(a.date||""));
  let h="";
  if(up.length){ h+=`<div class="month">👶 子ども向け優先・これから公開</div>`+up.map(card).join(""); }
  if(now.length){ h+=`<div class="month">🎬 いま二子玉川で上映中</div>`+now.map(card).join(""); }
  if(!h) h=`<div class="empty">条件に合う映画がありません。</div>`;
  return h;
}
function renderCal(){
  const list = visible();
  const by={};
  list.forEach(m=>{ const dt=parse(m.date); const k=dt?`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`:"9999-99"; (by[k]||=[]).push(m); });
  let h="";
  Object.keys(by).sort().forEach(k=>{
    const [y,mo]=k.split("-");
    const label = k==="9999-99" ? "日付未定" : `${y}年${Number(mo)}月`;
    const items = by[k].sort((a,b)=> (a.date||"9").localeCompare(b.date||"9") || b.kidScore-a.kidScore);
    h+=`<div class="month">🗓 ${label}</div>`+items.map(card).join("");
  });
  return h || `<div class="empty">条件に合う映画がありません。</div>`;
}
function render(){
  document.getElementById("stage").innerHTML = view==="list"?renderList():renderCal();
  bind();
}

document.querySelectorAll("#seg button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); view=b.dataset.v; render();
}));
const kt=document.getElementById("kidToggle");
kt.addEventListener("click",()=>{ kidOnly=!kidOnly; kt.classList.toggle("on",kidOnly); render(); });

// フッター
document.getElementById("thlink").href = DATA.theaterUrl || "#";
if(DATA.updated){ const d=new Date(DATA.updated); document.getElementById("updated").textContent = `最終更新: ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }

render();
</script>
