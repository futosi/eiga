<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>こども映画カレンダー｜二子玉川109シネマズ</title>
<style>
  /* ずっと明るい楽しいテーマ（ダークモードには追従しない） */
  :root{
    color-scheme:light;
    --card:#ffffff; --ink:#4a3526; --sub:#a07f63;
    --line:#ffe4c4; --accent:#ff7a2f; --pink:#ff5d9e; --yellow:#ffcb2d;
    --kid:#ff5d9e; --fam:#3bb0ff; --gen:#c3b09e; --now:#2fc46b;
    --chip:#fff2df; --shadow:0 8px 22px rgba(255,140,80,.18);
    --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;color:var(--ink);
    font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;
    line-height:1.6;padding-bottom:44px;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,203,45,.28), transparent 42%),
      radial-gradient(circle at 88% 4%, rgba(255,93,158,.22), transparent 40%),
      linear-gradient(180deg,#fff6e3 0%, #fff0ea 55%, #fef1de 100%);
    background-attachment:fixed;min-height:100vh}
  header{position:sticky;top:0;z-index:20;color:#fff;padding:16px 18px 20px;
    background:linear-gradient(120deg,#ffb43d 0%, #ff7a2f 35%, #ff5d9e 100%);
    border-radius:0 0 26px 26px;box-shadow:0 6px 20px rgba(255,120,80,.35)}
  h1{margin:0;font-size:21px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:8px;text-shadow:0 2px 6px rgba(0,0,0,.12)}
  .sub{margin:6px 0 0;font-size:12.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sub .pin{background:rgba(255,255,255,.28);padding:3px 10px;border-radius:999px;font-weight:800}
  .wrap{max-width:820px;margin:0 auto;padding:18px 14px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
  .seg{display:inline-flex;background:var(--card);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
  .seg button{border:0;background:none;color:var(--sub);font-weight:800;font-size:13.5px;padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s}
  .seg button.on{background:linear-gradient(120deg,var(--accent),var(--pink));color:#fff;box-shadow:0 4px 10px rgba(255,93,158,.4)}
  .toggle{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;
    background:var(--card);border-radius:999px;padding:8px 14px;cursor:pointer;box-shadow:var(--shadow);user-select:none;color:var(--ink)}
  .toggle .dot{width:38px;height:22px;border-radius:999px;background:#ffdfc0;position:relative;transition:.2s}
  .toggle .dot::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .toggle.on .dot{background:linear-gradient(120deg,var(--pink),var(--accent))}
  .toggle.on .dot::after{left:18px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--sub);font-weight:700;margin:-2px 0 16px;padding-left:2px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:12px;height:12px;border-radius:4px;display:inline-block}
  .month{font-size:16px;font-weight:800;margin:24px 2px 12px;color:var(--accent);display:flex;align-items:center;gap:8px}
  .card{background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:15px 16px;margin-bottom:13px;position:relative;overflow:hidden;cursor:pointer;transition:transform .12s, box-shadow .12s}
  .card:active{transform:scale(.985)}
  .card:hover{box-shadow:0 12px 28px rgba(255,120,80,.28)}
  .card .barleft{position:absolute;left:0;top:0;bottom:0;width:6px}
  .cd-top{display:flex;gap:13px;align-items:flex-start}
  .cd-date{min-width:60px;flex:0 0 auto;text-align:center;background:linear-gradient(160deg,#fff3df,#ffe6cf);
    border-radius:16px;padding:9px 4px 7px}
  .cd-date .big{font-size:28px;font-weight:800;line-height:1;color:var(--accent)}
  .cd-date .ym{font-size:11px;color:var(--sub);font-weight:800;margin-top:2px}
  .cd-date .wd{font-size:10.5px;color:var(--sub);margin-top:1px}
  .cd-body{flex:1;min-width:0}
  .title{font-size:16px;font-weight:800;margin:2px 0 5px;letter-spacing:.01em}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0 0}
  .chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;background:var(--chip);color:var(--sub)}
  .chip.kid{background:rgba(255,93,158,.16);color:var(--kid)}
  .chip.fam{background:rgba(59,176,255,.16);color:var(--fam)}
  .chip.mubi{background:rgba(255,122,47,.18);color:var(--accent)}
  .chip.now{background:rgba(47,196,107,.18);color:var(--now)}
  .countdown{display:inline-block;font-size:12px;font-weight:800;color:var(--accent);margin-top:6px;
    background:var(--chip);padding:3px 10px;border-radius:999px}
  .badge{display:inline-block;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;margin-top:6px;color:#fff}
  .badge.soon{background:linear-gradient(120deg,var(--pink),var(--accent));box-shadow:0 3px 8px rgba(255,93,158,.4)}
  .badge.now{background:linear-gradient(120deg,#2fc46b,#4bd07f);box-shadow:0 3px 8px rgba(47,196,107,.35)}
  .detail{display:none;margin-top:13px;padding-top:13px;border-top:2px dashed var(--line);font-size:13.5px}
  .card.open .detail{display:block}
  .detail .meta{font-size:12px;color:var(--sub);margin:0 0 8px}
  .detail .k{font-weight:800;font-size:12.5px;color:var(--accent);display:flex;align-items:center;gap:5px;margin:10px 0 5px}
  .mubi-box{background:linear-gradient(160deg,#fff5e6,#ffe9f2);border-radius:14px;padding:11px 13px}
  .mubi-box .price{font-weight:800;color:var(--accent);font-size:14.5px}
  .mubi-box .perk{font-size:12.5px;margin-top:4px}
  .nomubi{color:var(--sub);font-size:12.5px}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
  .links a{font-size:12.5px;font-weight:800;text-decoration:none;border-radius:999px;padding:8px 15px}
  .links a.fill{background:linear-gradient(120deg,var(--accent),var(--pink));color:#fff;box-shadow:0 4px 10px rgba(255,93,158,.35)}
  .links a.ghost{color:var(--accent);border:2px solid var(--accent)}
  .empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}
  footer{text-align:center;color:var(--sub);font-size:11px;margin-top:28px;padding:0 14px;line-height:1.7}
  footer a{color:var(--accent);font-weight:700}
</style>

<header>
  <h1>🎬 こども映画カレンダー</h1>
  <div class="sub"><span class="pin">📍 二子玉川 109シネマズ</span><span>公開日・ムビチケ特典がひと目でわかる</span></div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="seg" id="seg">
      <button data-v="list" class="on">📋 リスト</button>
      <button data-v="cal">🗓 カレンダー</button>
    </div>
    <div class="toggle on" id="kidToggle"><span class="dot"></span><span>子ども向けだけ</span></div>
  </div>
  <div class="legend">
    <span><i class="swatch" style="background:var(--kid)"></i>幼児・子ども向け</span>
    <span><i class="swatch" style="background:var(--fam)"></i>ファミリー</span>
    <span><i class="swatch" style="background:var(--now)"></i>上映中</span>
    <span>🎟 ＝ムビチケ特典あり</span>
  </div>
  <div id="stage"></div>
</div>

<footer>
  上映情報は <a id="thlink" href="#" target="_blank" rel="noopener">109シネマズ二子玉川</a> の上映中・公開予定作品を元に週1回自動更新。<span id="updated"></span><br>
  ムビチケ特典は手動まとめ。価格・特典・公開日は変更される場合があります。おでかけ前に公式サイトでご確認ください。
</footer>

<script src="data.js"></script>
<script>
const DATA = window.MOVIE_DATA || {movies:[], theater:"二子玉川 109シネマズ", theaterUrl:"https://109cinemas.net/futakotamagawa/"};
const MOVIES = DATA.movies || [];
const WD = ["日","月","火","水","木","金","土"];
let TODAY = new Date(); TODAY.setHours(0,0,0,0);
let view = "list", kidOnly = true;

function parse(d){ if(!d) return null; const [y,m,day]=d.split("-").map(Number); return new Date(y,m-1,day); }
function catLabel(c){ return c==="kid"?"子ども向け":c==="fam"?"ファミリー":"一般"; }
function catColor(c){ return c==="kid"?"var(--kid)":c==="fam"?"var(--fam)":"var(--gen)"; }
function daysLeft(dt){ return dt? Math.round((dt - TODAY)/86400000) : null; }

function visible(){ return MOVIES.filter(m=> kidOnly ? m.cat!=="gen" : true); }

function statusBadge(m){
  const dt = parse(m.date), dl = daysLeft(dt);
  if(m.status==="now" || (dl!==null && dl<=0)) return `<span class="badge now">🎬 上映中</span>`;
  if(dl===0) return `<span class="badge soon">🎉 本日公開！</span>`;
  if(dl!==null && dl>0 && dl<=14) return `<span class="badge soon">あと ${dl} 日で公開</span>`;
  if(dl!==null && dl>0) return `<span class="countdown">あと ${dl} 日</span>`;
  return `<span class="badge soon">公開予定</span>`;
}
function chips(m){
  let h = `<span class="chip ${m.cat==='kid'?'kid':m.cat==='fam'?'fam':''}">${catLabel(m.cat)}</span>`;
  h += `<span class="chip">${m.age||""}</span>`;
  if(m.env) h += `<span class="chip">${m.env.split(",")[0]}</span>`;
  if(m.mubi) h += `<span class="chip mubi">🎟 ムビチケ特典</span>`;
  return h;
}
function mubiHtml(m){
  if(!m.mubi) return `<p class="nomubi">この作品のムビチケ特典情報は未登録です。下のリンクから公式サイトでご確認ください。</p>`;
  return `<div class="mubi-box"><div class="price">💴 ${m.mubi.price}</div><div class="perk">🎁 ${m.mubi.perk}</div></div>`;
}
function card(m){
  const dt = parse(m.date);
  const dd = dt ? dt.getDate() : "?";
  const mm = dt ? (dt.getMonth()+1)+"月" : "";
  const wd = dt ? "("+WD[dt.getDay()]+")" : "";
  const meta = [m.director&&("監督: "+m.director), m.actor&&("出演: "+m.actor.slice(0,40)+(m.actor.length>40?"…":""))].filter(Boolean).join(" ／ ");
  return `<div class="card" data-t="${encodeURIComponent(m.t)}">
    <span class="barleft" style="background:${catColor(m.cat)}"></span>
    <div class="cd-top">
      <div class="cd-date"><div class="big">${dd}</div><div class="ym">${mm}</div><div class="wd">${wd}</div></div>
      <div class="cd-body">
        <p class="title">${m.t}</p>
        ${statusBadge(m)}
        <div class="chips">${chips(m)}</div>
      </div>
    </div>
    <div class="detail">
      ${meta?`<p class="meta">${meta}</p>`:""}
      <div class="k">🎟 ムビチケ（前売り券）特典</div>
      ${mubiHtml(m)}
      <div class="links">
        <a class="fill" href="${m.site}" target="_blank" rel="noopener">二子玉川の上映時間・詳細 ↗</a>
        <a class="ghost" href="https://www.google.com/search?q=${encodeURIComponent(m.t+' ムビチケ 特典')}" target="_blank" rel="noopener">ムビチケ特典を調べる ↗</a>
      </div>
    </div>
  </div>`;
}
function bind(){ document.querySelectorAll(".card").forEach(c=>c.addEventListener("click",e=>{ if(!e.target.closest("a")) c.classList.toggle("open"); })); }

function renderList(){
  const list = visible();
  const up = list.filter(m=>{ const dl=daysLeft(parse(m.date)); return m.status!=="now" && dl!==null && dl>0; });
  const now = list.filter(m=> m.status==="now" || (()=>{const dl=daysLeft(parse(m.date));return dl!==null&&dl<=0;})());
  up.sort((a,b)=> b.kidScore-a.kidScore || (a.date||"9").localeCompare(b.date||"9"));
  now.sort((a,b)=> b.kidScore-a.kidScore || (b.date||"").localeCompare(a.date||""));
  let h="";
  if(up.length){ h+=`<div class="month">👶 子ども向け優先・これから公開</div>`+up.map(card).join(""); }
  if(now.length){ h+=`<div class="month">🎬 いま二子玉川で上映中</div>`+now.map(card).join(""); }
  if(!h) h=`<div class="empty">条件に合う映画がありません。</div>`;
  return h;
}
function renderCal(){
  const list = visible();
  const by={};
  list.forEach(m=>{ const dt=parse(m.date); const k=dt?`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`:"9999-99"; (by[k]||=[]).push(m); });
  let h="";
  Object.keys(by).sort().forEach(k=>{
    const [y,mo]=k.split("-");
    const label = k==="9999-99" ? "日付未定" : `${y}年${Number(mo)}月`;
    const items = by[k].sort((a,b)=> (a.date||"9").localeCompare(b.date||"9") || b.kidScore-a.kidScore);
    h+=`<div class="month">🗓 ${label}</div>`+items.map(card).join("");
  });
  return h || `<div class="empty">条件に合う映画がありません。</div>`;
}
function render(){
  document.getElementById("stage").innerHTML = view==="list"?renderList():renderCal();
  bind();
}

document.querySelectorAll("#seg button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); view=b.dataset.v; render();
}));
const kt=document.getElementById("kidToggle");
kt.addEventListener("click",()=>{ kidOnly=!kidOnly; kt.classList.toggle("on",kidOnly); render(); });

// フッター
document.getElementById("thlink").href = DATA.theaterUrl || "#";
if(DATA.updated){ const d=new Date(DATA.updated); document.getElementById("updated").textContent = `最終更新: ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }

render();
</script>
